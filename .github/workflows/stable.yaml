# ============================================
# DEPRECATED WORKFLOW
# ============================================
# This workflow is permanently disabled.
# All publishing (latest, canary, beta) is now handled by dev.yaml
# which uses OIDC trusted publishing.
#
# For local/CLI releases, use:
#   pnpm release:patch
#   pnpm release:minor
#
# These require npm CLI authentication (npm login).
# ============================================

name: Publish stable (DEPRECATED)

on:
  workflow_dispatch:

jobs:
  publish:
    # Permanently disabled - use dev.yaml or CLI instead
    if: false
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Using Node from .nvmrc
        uses: useblacksmith/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Git user
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Build dependencies
        run: |
          node etc/bootstrapEnv
          pnpm install
          pnpm build

      - name: Setup npm
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc
          git update-index --assume-unchanged .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Version packages
        run: pnpm exec lerna version minor --conventional-commits --force-git-tag --yes --no-push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Publish to npm
        run: pnpm publish -r --access public --tag latest --no-git-checks

      - name: Push tags to git
        run: git push --follow-tags
