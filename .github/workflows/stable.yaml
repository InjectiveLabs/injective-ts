name: Publish stable

# Stable releases are now done via CLI: pnpm release:minor (or :patch, :major)
# This workflow is kept for reference but disabled

on:
  workflow_dispatch:

jobs:
  publish:
    if: false # Use CLI instead: pnpm release:minor
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Using Node from .nvmrc
        uses: useblacksmith/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Git user
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Build dependencies
        run: |
          node etc/bootstrapEnv
          pnpm install
          pnpm build

      - name: Setup npm
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc
          git update-index --assume-unchanged .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Version and publish
        run: |
          pnpm exec lerna version minor --conventional-commits --force-git-tag --yes
          pnpm exec lerna publish from-git --dist-tag latest --yes --no-private
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
