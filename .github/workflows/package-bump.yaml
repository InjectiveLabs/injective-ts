name: Package Bump

# This workflow bumps package versions across all downstream repositories.
# Can be triggered:
# 1. Manually via GitHub UI (workflow_dispatch)
# 2. Automatically called from publish.yaml after successful latest publish

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  package-bump-layer:
    name: 'Package bump layer'
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: InjectiveLabs
          repositories: injective-ui
          permission-contents: write
          permission-pull-requests: write

      - name: Package bump layer
        uses: InjectiveLabs/github-fe/actions/package-bump@master
        with:
          gh_token: ${{ steps.app-token.outputs.token }}
          repository_url: injectiveLabs/injective-ui
          repository_branch: master

  package-bump-hub:
    name: 'Package bump hub'
    runs-on: ubuntu-latest
    needs: package-bump-layer

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: InjectiveLabs
          repositories: injective-hub
          permission-contents: write
          permission-pull-requests: write

      - name: Package bump Hub
        uses: InjectiveLabs/github-fe/actions/package-bump@master
        with:
          gh_token: ${{ steps.app-token.outputs.token }}
          repository_url: injectiveLabs/injective-hub
          repository_branch: dev

  package-bump-helix:
