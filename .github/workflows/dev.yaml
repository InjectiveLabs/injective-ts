name: Publish

# Unified publish workflow for all release types:
# - latest: Triggered on push to dev branch (npm tag: latest)
# - canary: Triggered on feature branches with "canary" in commit message (npm tag: alpha)
# - beta: Triggered on feature branches with "beta" in commit message (npm tag: beta)
#
# Uses OIDC trusted publishing - no NPM_TOKEN required.
# Configured as trusted publisher on npm: https://docs.npmjs.com/trusted-publishers

on:
  push:
    branches-ignore:
      - master
  workflow_dispatch:

# OIDC requires id-token: write permission
# contents: write is needed for git push --follow-tags
permissions:
  contents: write
  id-token: write

jobs:
  # ============================================
  # Publish Job - Handles latest, canary, and beta
  # ============================================
  publish:
    name: 'Publish'
    runs-on: ubuntu-latest
    # Skip if:
    # - Contains skip keywords (for dev branch)
    # - Is workflow_dispatch on dev branch
    # - Is a feature branch without canary/beta keyword
    if: |
      !contains(github.event.head_commit.message, 'GITBOOK') &&
      !contains(github.event.head_commit.message, 'skip-deploy') &&
      !contains(github.event.head_commit.message, 'skip deploy') &&
      (
        github.ref == 'refs/heads/dev' ||
        contains(github.event.head_commit.message, 'canary') ||
        contains(github.event.head_commit.message, 'beta')
      ) &&
      !(github.ref == 'refs/heads/dev' && github.event_name == 'workflow_dispatch')
    outputs:
      publish_type: ${{ steps.determine-publish-type.outputs.type }}
      dist_tag: ${{ steps.determine-publish-type.outputs.dist_tag }}
      version_args: ${{ steps.determine-publish-type.outputs.version_args }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Using Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # OIDC trusted publishing requires npm 11.5.1+
      - name: Update npm and set up Git user
        run: |
          npm install -g npm@latest &
          NPM_PID=$!
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          wait $NPM_PID || { echo "::error::Failed to update npm"; exit 1; }

      - name: Determine publish type
        id: determine-publish-type
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref }}
        run: |
          # Check for conflicting keywords
          HAS_CANARY=false
          HAS_BETA=false

          if echo "$COMMIT_MSG" | grep -qi "canary"; then
            HAS_CANARY=true
          fi

          if echo "$COMMIT_MSG" | grep -qi "beta"; then
            HAS_BETA=true
          fi

          # Determine publish type based on branch and commit message
          if [[ "$BRANCH" == "refs/heads/dev" ]]; then
            TYPE="latest"
            DIST_TAG="latest"
            VERSION_ARGS="patch --force-publish --force-git-tag --no-changelog --yes --no-push"
          elif [[ "$HAS_CANARY" == "true" && "$HAS_BETA" == "true" ]]; then
            echo "::error::Commit message contains both 'canary' and 'beta'. Please use only one."
            exit 1
          elif [[ "$HAS_CANARY" == "true" ]]; then
            TYPE="canary"
            DIST_TAG="alpha"
            VERSION_ARGS="prerelease --preid alpha --force-publish --force-git-tag --no-changelog --yes --no-push"
          elif [[ "$HAS_BETA" == "true" ]]; then
            TYPE="beta"
            DIST_TAG="beta"
            VERSION_ARGS="prerelease --preid beta --force-publish --force-git-tag --no-changelog --yes --no-push"
          else
            echo "::error::No valid publish type determined. This should not happen."
            exit 1
          fi

          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "dist_tag=$DIST_TAG" >> $GITHUB_OUTPUT
          echo "version_args=$VERSION_ARGS" >> $GITHUB_OUTPUT

      - name: Build dependencies
        run: |
          node etc/bootstrapEnv
          pnpm install
          pnpm build

      - name: Version packages
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          pnpm exec lerna version ${{ steps.determine-publish-type.outputs.version_args }}

      # pnpm pack resolves catalog: protocol, npm publish handles OIDC authentication
      - name: Publish to npm (OIDC)
        run: |
          DIST_TAG="${{ steps.determine-publish-type.outputs.dist_tag }}"
          ROOT_DIR="$(pwd)"

          # Create a temporary directory for publish scripts
          mkdir -p "$ROOT_DIR/.publish-tmp"

          # Generate publish commands for all packages (use null delimiter for safety)
          for pkg_json in packages/*/package.json packages/wallets/*/package.json; do
            pkg_dir=$(dirname "$pkg_json")
            pkg_name=$(node -p "require('./$pkg_json').name")
            pkg_version=$(node -p "require('./$pkg_json').version")
            tarball_name=$(echo "$pkg_name" | sed 's/@//;s/\//-/')-$pkg_version.tgz
            
            # Pack with pnpm to resolve catalog: dependencies
            pnpm --dir "$pkg_dir" pack --pack-destination "$ROOT_DIR/.publish-tmp"
            
            if [ -f "$ROOT_DIR/.publish-tmp/$tarball_name" ]; then
              # Use null delimiter to safely handle any package names
              printf '%s\t%s\t%s\0' "$ROOT_DIR/.publish-tmp/$tarball_name" "$pkg_name" "$pkg_version" >> "$ROOT_DIR/.publish-tmp/packages.txt"
            else
              echo "⚠️ No tarball found for $pkg_name"
            fi
          done

          # Publish packages in parallel (4 concurrent jobs)
          RESULTS_FILE="$ROOT_DIR/.publish-tmp/results.txt"
          FAILED_FILE="$ROOT_DIR/.publish-tmp/failed.txt"
          touch "$RESULTS_FILE" "$FAILED_FILE"

          publish_package() {
            IFS=$'\t' read -r tarball pkg_name pkg_version <<< "$1"
            echo "📦 Publishing $pkg_name@$pkg_version"
            if npm publish "$tarball" --access public --tag "$DIST_TAG" --provenance 2>&1; then
              echo "$pkg_name:$pkg_version" >> "$RESULTS_FILE"
            else
              echo "$pkg_name:$pkg_version" >> "$FAILED_FILE"
              echo "::warning::Failed to publish $pkg_name@$pkg_version"
            fi
          }
          export -f publish_package
          export DIST_TAG RESULTS_FILE FAILED_FILE

          # Run publishes in parallel using null delimiter for safety
          if [ -f "$ROOT_DIR/.publish-tmp/packages.txt" ]; then
            xargs -0 -P 4 -I {} bash -c 'publish_package "$@"' _ {} < "$ROOT_DIR/.publish-tmp/packages.txt"
          fi

          # Build results from file
          PUBLISH_COUNT=$(wc -l < "$RESULTS_FILE" | tr -d ' ')
          FAILED_COUNT=$(wc -l < "$FAILED_FILE" | tr -d ' ')

          # Build JSON array efficiently
          PUBLISHED_PACKAGES=$(node -e "
            const fs = require('fs');
            const lines = fs.readFileSync('$RESULTS_FILE', 'utf8').trim().split('\n').filter(Boolean);
            const packages = lines.map(line => {
              const [name, version] = line.split(':');
              return { name, version };
            });
            console.log(JSON.stringify(packages));
          ")

          # Cleanup
          rm -rf "$ROOT_DIR/.publish-tmp"

          echo "{\"publishedPackages\":$PUBLISHED_PACKAGES}" > pnpm-publish-summary.json

          if [ "$FAILED_COUNT" -gt 0 ]; then
            echo "::warning::$FAILED_COUNT package(s) failed to publish"
          fi

          if [ "$PUBLISH_COUNT" -eq 0 ]; then
            echo "::error::No packages were published. Check npm OIDC trusted publisher configuration."
            exit 1
          fi

          echo "✅ Successfully published $PUBLISH_COUNT packages"

      - name: Push tags to git
        run: |
          git push --follow-tags

      - name: Broadcast published versions on Slack
        run: node etc/slack.cjs --api=$SLACK_API --actor=$GIT_ACTOR --commit-message=$GIT_LATEST_COMMIT_MESSAGE
        env:
          GIT_ACTOR: ${{ github.actor }}
          SLACK_API: ${{ secrets.SLACK_API }}
          GIT_LATEST_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

  # ============================================
  # Package Bump Jobs (only after latest publish on dev branch)
  # ============================================
  package-bump-layer:
    name: 'Package bump layer'
    runs-on: ubuntu-latest
    needs: publish
    if: |
      always() &&
      (needs.publish.result == 'success' && needs.publish.outputs.publish_type == 'latest') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Package bump layer
        uses: InjectiveLabs/github-fe/actions/package-bump@master
        with:
          gh_token: ${{ secrets.GH_TOKEN }}
          repository_url: injectiveLabs/injective-ui
          repository_branch: master

  package-bump-hub:
    name: 'Package bump hub'
    runs-on: ubuntu-latest
    needs: [publish, package-bump-layer]
    if: |
      always() &&
      (needs.publish.result == 'success' && needs.publish.outputs.publish_type == 'latest') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Package bump Hub
        uses: InjectiveLabs/github-fe/actions/package-bump@master
        with:
          gh_token: ${{ secrets.GH_TOKEN }}
          repository_url: injectiveLabs/injective-hub
          repository_branch: dev

  package-bump-helix:
    name: 'Package bump Helix'
    runs-on: ubuntu-latest
    needs: [publish, package-bump-layer]
    if: |
      always() &&
      (needs.publish.result == 'success' && needs.publish.outputs.publish_type == 'latest') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Package bump Helix
        uses: InjectiveLabs/github-fe/actions/package-bump@master
        with:
          gh_token: ${{ secrets.GH_TOKEN }}
          repository_url: injectiveLabs/injective-helix
          repository_branch: dev

  package-bump-explorer:
    name: 'Package bump Explorer'
    runs-on: ubuntu-latest
    needs: [publish, package-bump-layer]
    if: |
      always() &&
      (needs.publish.result == 'success' && needs.publish.outputs.publish_type == 'latest') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Package bump Explorer
        uses: InjectiveLabs/github-fe/actions/package-bump@master
        with:
          gh_token: ${{ secrets.GH_TOKEN }}
          repository_url: injectiveLabs/injective-explorer
          repository_branch: dev

  package-bump-trading-ui:
    name: 'Package bump Trading UI'
    runs-on: ubuntu-latest
    needs: [publish, package-bump-layer]
    if: |
      always() &&
      (needs.publish.result == 'success' && needs.publish.outputs.publish_type == 'latest') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Package bump Trading UI
        uses: InjectiveLabs/github-fe/actions/package-bump@master
        with:
          gh_token: ${{ secrets.GH_TOKEN }}
          repository_url: injectiveLabs/injective-trading-ui
          repository_branch: dev

  package-bump-mito:
    name: 'Package bump Mito'
    runs-on: ubuntu-latest
    needs: [publish, package-bump-layer]
    if: |
      always() &&
      (needs.publish.result == 'success' && needs.publish.outputs.publish_type == 'latest') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Package bump Mito
        uses: InjectiveLabs/github-fe/actions/package-bump@master
        with:
          gh_token: ${{ secrets.GH_TOKEN }}
          repository_url: mitoFinance/mito-ui
          repository_branch: dev

  package-bump-ui-api:
    name: 'Package bump UI API'
    runs-on: ubuntu-latest
    needs: [publish, package-bump-layer]
    if: |
      always() &&
      (needs.publish.result == 'success' && needs.publish.outputs.publish_type == 'latest') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Package bump UI API
        uses: InjectiveLabs/github-fe/actions/package-bump@master
        with:
          gh_token: ${{ secrets.GH_TOKEN }}
          repository_url: injectiveLabs/injective-ui-api
          repository_branch: staging

  package-bump-admin-ui:
    name: 'Package bump Admin UI'
    runs-on: ubuntu-latest
    needs: [publish, package-bump-layer]
    if: |
      always() &&
      (needs.publish.result == 'success' && needs.publish.outputs.publish_type == 'latest') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Package bump Admin UI
        uses: InjectiveLabs/github-fe/actions/package-bump@master
        with:
          gh_token: ${{ secrets.GH_TOKEN }}
          repository_url: InjectiveLabs/injective-admin-ui
          repository_branch: dev

  package-bump-do-ui:
    name: 'Package bump DO UI'
    runs-on: ubuntu-latest
    needs: [publish, package-bump-layer]
    if: |
      always() &&
      (needs.publish.result == 'success' && needs.publish.outputs.publish_type == 'latest') ||
