name: Publish

# Unified publish workflow for all release types:
# - latest: Triggered from master branch activity (npm tag: latest)
#   - Regular master commits prepare or update a release PR
#   - The merged "chore: release" commit on master performs the actual publish
#   - Default: patch bump
#   - With "release-minor" in commit message: minor bump
# - canary: Triggered on feature branches with "canary" in commit message (npm tag: alpha)
# - beta: Triggered on feature branches with "beta" in commit message (npm tag: beta)
#
# Uses OIDC trusted publishing - no NPM_TOKEN required.
# Configured as trusted publisher on npm: https://docs.npmjs.com/trusted-publishers
#
# Creates a single consolidated GitHub Release per publish (no CHANGELOG files modified).

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - canary
          - beta
          - prod

concurrency:
  group: publish-${{ github.repository }}
  cancel-in-progress: false

jobs:
  # ============================================
  # Publish Job - Handles latest, canary, and beta
  # ============================================
  publish:
    name: 'Publish'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    # Skip if:
    # - Contains skip keywords
    # - Is the automation-managed release branch
    # - Is a feature branch without canary/beta keyword and not a workflow_dispatch
    # - Is workflow_dispatch on master with a non-prod release type
    if: |
      !contains(github.event.head_commit.message, 'GITBOOK') &&
      github.ref != 'refs/heads/release/master' &&
      (
        github.ref == 'refs/heads/master' ||
        contains(github.event.head_commit.message, 'canary') ||
        contains(github.event.head_commit.message, 'beta') ||
        (github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/heads/'))
      ) &&
      !(github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch' && inputs.release_type != 'prod')
    outputs:
      mode: ${{ steps.determine-publish-type.outputs.mode }}
      publish_type: ${{ steps.determine-publish-type.outputs.type }}
      dist_tag: ${{ steps.determine-publish-type.outputs.dist_tag }}
      version_args: ${{ steps.determine-publish-type.outputs.version_args }}

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Using Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # OIDC trusted publishing requires npm 11.5.1+
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@11

      - name: Set up Git user
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Determine publish type
        id: determine-publish-type
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          MODE=""

          # Handle workflow_dispatch input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RELEASE_TYPE="${{ inputs.release_type }}"
            if [[ "$RELEASE_TYPE" == "prod" ]]; then
              if [[ "$BRANCH" != "refs/heads/master" ]]; then
                echo "::error::prod releases can only be triggered from the master branch"
                exit 1
              fi
              MODE="prepare_release_pr"
              TYPE="latest"
              DIST_TAG="latest"
              VERSION_ARGS="patch --force-publish --no-changelog --yes --no-push --no-git-tag-version"
            elif [[ "$RELEASE_TYPE" == "canary" ]]; then
              MODE="direct_publish"
              TYPE="canary"
              DIST_TAG="alpha"
              VERSION_ARGS="prerelease --preid alpha --force-publish --force-git-tag --no-changelog --yes --no-push"
            elif [[ "$RELEASE_TYPE" == "beta" ]]; then
              MODE="direct_publish"
              TYPE="beta"
              DIST_TAG="beta"
              VERSION_ARGS="prerelease --preid beta --force-publish --force-git-tag --no-changelog --yes --no-push"
            else
              echo "::error::Unrecognized release_type '$RELEASE_TYPE'"
              exit 1
            fi
            echo "mode=$MODE" >> $GITHUB_OUTPUT
            echo "type=$TYPE" >> $GITHUB_OUTPUT
            echo "dist_tag=$DIST_TAG" >> $GITHUB_OUTPUT
            echo "version_args=$VERSION_ARGS" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for keywords
          HAS_CANARY=false
          HAS_BETA=false
          HAS_RELEASE_MINOR=false

          if echo "$COMMIT_MSG" | grep -qi "canary"; then
            HAS_CANARY=true
          fi

          if echo "$COMMIT_MSG" | grep -qi "beta"; then
            HAS_BETA=true
          fi

          if echo "$COMMIT_MSG" | grep -qi "release-minor"; then
            HAS_RELEASE_MINOR=true
          fi

          # Determine publish type based on branch and commit message
          if [[ "$BRANCH" == "refs/heads/master" ]]; then
            TYPE="latest"
            DIST_TAG="latest"

            RELEASE_PR_HEAD=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPOSITORY}/commits/${SHA}/pulls" \
              --jq '.[] | select(.merged_at != null and .head.ref == "release/master") | .head.ref' \
              | head -n1)

            if [[ "$RELEASE_PR_HEAD" == "release/master" ]]; then
              MODE="publish_release"
              VERSION_ARGS=""
            else
              MODE="prepare_release_pr"

              # Determine bump type: minor if "release-minor" keyword, otherwise patch
              if [[ "$HAS_RELEASE_MINOR" == "true" ]]; then
                BUMP_TYPE="minor"
              else
                BUMP_TYPE="patch"
              fi

              VERSION_ARGS="$BUMP_TYPE --force-publish --no-changelog --yes --no-push --no-git-tag-version"
            fi
          elif [[ "$HAS_CANARY" == "true" && "$HAS_BETA" == "true" ]]; then
            echo "::error::Commit message contains both 'canary' and 'beta'. Please use only one."
            exit 1
          elif [[ "$HAS_CANARY" == "true" ]]; then
            MODE="direct_publish"
            TYPE="canary"
            DIST_TAG="alpha"
            VERSION_ARGS="prerelease --preid alpha --force-publish --force-git-tag --no-changelog --yes --no-push"
          elif [[ "$HAS_BETA" == "true" ]]; then
            MODE="direct_publish"
            TYPE="beta"
            DIST_TAG="beta"
            VERSION_ARGS="prerelease --preid beta --force-publish --force-git-tag --no-changelog --yes --no-push"
          else
            echo "::error::No valid publish type determined. This should not happen."
            exit 1
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "dist_tag=$DIST_TAG" >> $GITHUB_OUTPUT
          echo "version_args=$VERSION_ARGS" >> $GITHUB_OUTPUT

      - name: Security scan
        uses: InjectiveLabs/github-fe/actions/security-scan@master
        timeout-minutes: 5

      - name: Install dependencies
        run: |
          node etc/bootstrapEnv
          pnpm install

      - name: Build
        run: pnpm build

      - name: Version packages
        if: steps.determine-publish-type.outputs.mode != 'publish_release'
        run: |
          pnpm exec lerna version ${{ steps.determine-publish-type.outputs.version_args }}

      - name: Create or update release PR
        if: steps.determine-publish-type.outputs.mode == 'prepare_release_pr'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: release/master
          base: master
          delete-branch: true
          commit-message: 'chore: release'
          title: 'chore: release'
          body: |
            Automated release PR created by the publish workflow.

            Merging this PR will publish the versioned packages from `master`.
          author: '${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>'
          committer: '${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>'

      - name: Push version commits and tags to git
        if: steps.determine-publish-type.outputs.mode == 'direct_publish'
        run: |
          git push origin HEAD --follow-tags

      - name: Create and push release tag
        if: github.ref == 'refs/heads/master' && steps.determine-publish-type.outputs.mode == 'publish_release'
        run: |
          VERSION=$(node -p "require('./packages/sdk-ts/package.json').version")
          TAG="v${VERSION}"

          if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            if ! git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
              git tag "$TAG"
            fi
            git push origin "refs/tags/$TAG"
          fi

      # pnpm pack resolves catalog: protocol, npm publish handles OIDC authentication
      - name: Publish to npm (OIDC)
        if: steps.determine-publish-type.outputs.mode != 'prepare_release_pr'
        run: |
          DIST_TAG="${{ steps.determine-publish-type.outputs.dist_tag }}"
          PUBLISHED_PACKAGES="[]"
          ROOT_DIR="$(pwd)"
          PUBLISH_COUNT=0

          for pkg_json in packages/*/package.json packages/wallets/*/package.json; do
            pkg_dir=$(dirname "$pkg_json")
            pkg_name=$(node -p "require('./$pkg_json').name")
            pkg_version=$(node -p "require('./$pkg_json').version")

            echo "📦 Publishing $pkg_name@$pkg_version"

            # Pack with pnpm to resolve catalog: dependencies
            pnpm --dir "$pkg_dir" pack --pack-destination "$ROOT_DIR"

            tarball_name=$(echo "$pkg_name" | sed 's/@//;s/\//-/')-$pkg_version.tgz

            if [ -f "$tarball_name" ]; then
              if npm publish "$tarball_name" --access public --tag "$DIST_TAG" --provenance; then
                PUBLISHED_PACKAGES=$(echo "$PUBLISHED_PACKAGES" | node -p "JSON.stringify([...JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')), {name:'$pkg_name',version:'$pkg_version'}])")
                PUBLISH_COUNT=$((PUBLISH_COUNT + 1))
              fi
              rm -f "$tarball_name"
            else
              echo "⚠️ No tarball found for $pkg_name"
            fi
          done

          echo "{\"publishedPackages\":$PUBLISHED_PACKAGES}" > pnpm-publish-summary.json

          if [ "$PUBLISH_COUNT" -eq 0 ]; then
            echo "::error::No packages were published. Check npm OIDC trusted publisher configuration."
            exit 1
          fi

          echo "✅ Successfully published $PUBLISH_COUNT packages"

      - name: Broadcast published versions on Slack
        if: steps.determine-publish-type.outputs.mode != 'prepare_release_pr'
        run: node etc/slack.cjs --api="$SLACK_API" --actor="$GIT_ACTOR" --commit-message="$GIT_LATEST_COMMIT_MESSAGE"
        env:
          GIT_ACTOR: ${{ github.actor }}
          SLACK_API: ${{ secrets.SLACK_API }}
          GIT_LATEST_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

      # Run last so a failure here can't block the actual publish (npm) or
      # the Slack broadcast. The release is a nice-to-have artifact; if this
      # step fails, retry manually with:
      #   gh release create vX.Y.Z --title vX.Y.Z --notes "..." --latest --verify-tag
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/master' && steps.determine-publish-type.outputs.mode == 'publish_release'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(node -p "require('./packages/sdk-ts/package.json').version")
          TAG="v${VERSION}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            PREV_TAG=$(git tag -l 'v[0-9]*' --sort=-v:refname \
                        | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                        | grep -v "^${TAG}$" \
                        | head -n1)

            # Build changelog from git log, categorised by conventional-commit prefix.
            # Excludes merge commits and the lerna "chore: release" commit.
            if [ -n "$PREV_TAG" ]; then
              COMMITS=$(git log --pretty=format:'%s (%h)' "${PREV_TAG}..${TAG}" --no-merges \
                        | grep -v '^chore: release')
            else
              COMMITS=""
            fi

            if [ -n "$COMMITS" ]; then
              NOTES=$(printf '## What'\''s Changed\n\n%s' "$(echo "$COMMITS" | sed 's/^/- /')")
            else
              NOTES="Release $TAG"
            fi

            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES" \
              --latest \
              --verify-tag
          fi

  # ============================================
  # Package Bump Jobs (only after latest publish on master branch)
  # ============================================
  # trigger-package-bumps:
  #   name: 'Trigger Package Bumps'
  #   needs: publish
  #   if: needs.publish.result == 'success' && needs.publish.outputs.publish_type == 'latest' && needs.publish.outputs.mode == 'publish_release'
  #   uses: ./.github/workflows/package-bump.yaml
  #   secrets: inherit
